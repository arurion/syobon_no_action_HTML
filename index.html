function applyChroma(img) {
  const oc = document.createElement('canvas');
  oc.width = img.naturalWidth || img.width;
  oc.height = img.naturalHeight || img.height;
  const octx = oc.getContext('2d');
  octx.drawImage(img, 0, 0);
  const id = octx.getImageData(0, 0, oc.width, oc.height);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i]===CHROMA_R && d[i+1]===CHROMA_G && d[i+2]===CHROMA_B) {
      d[i+3] = 0;
    }
  }
  octx.putImageData(id, 0, 0);
  return oc;
}

let drawColor = 'rgb(0,0,0)';
let mirror = 0;

function setcolor(r,g,b){ drawColor=`rgb(${r},${g},${b})`; }
function setc0(){ drawColor='rgb(0,0,0)'; }
function setc1(){ drawColor='rgb(255,255,255)'; }
function fillrect(x,y,w,h){ if(w<=0||h<=0)return; ctx.fillStyle=drawColor; ctx.fillRect(x,y,w,h); }
function drawrect(x,y,w,h){ if(w<=0||h<=0)return; ctx.strokeStyle=drawColor; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,w-1,h-1); }
function drawline(x1,y1,x2,y2){ ctx.strokeStyle=drawColor; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
function fillarc(x,y,rx,ry){ ctx.fillStyle=drawColor; ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.fill(); }
function drawarc(x,y,rx,ry){ ctx.strokeStyle=drawColor; ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.stroke(); }

function drawimage(gid, gtype, dx, dy) {
  const def = grapDef[gid] && grapDef[gid][gtype];
  if (!def) return;
  
  // 座標を強制的に整数にする（にじみ・黒枠の巻き込み防止）
  const idx = Math.floor(dx);
  const idy = Math.floor(dy);

  // タイトル画像特殊処理
  if (gtype===6) {
    const src = IMG[def.imgKey];
    if (!src) return;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(src, idx, idy);
    return;
  }
  const src = IMG[def.imgKey];
  if (!src) return;
  const {sx,sy,sw,sh} = def;
  if (sw<=0||sh<=0) return;
  
  ctx.save();
  ctx.imageSmoothingEnabled = false; // ブラウザの勝手なぼやけを無効化
  if (mirror) {
    ctx.translate(idx+sw, idy);
    ctx.scale(-1,1);
    ctx.drawImage(src, sx,sy,sw,sh, 0,0,sw,sh);
  } else {
    ctx.drawImage(src, sx,sy,sw,sh, idx,idy,sw,sh);
  }
  ctx.restore();
}

function DrawRotaGraph(cx,cy, scale, angle, gid, gtype) {
  const def = grapDef[gid] && grapDef[gid][gtype]; if(!def)return;
  const src = IMG[def.imgKey]; if(!src)return;
  const {sx,sy,sw,sh}=def;
  
  const icx = Math.floor(cx);
  const icy = Math.floor(cy);

  ctx.save();
  ctx.imageSmoothingEnabled = false; // ブラウザの勝手なぼやけを無効化
  ctx.translate(icx, icy); 
  ctx.rotate(angle); 
  ctx.scale(scale,scale);
  ctx.drawImage(src,sx,sy,sw,sh,-sw/2,-sh/2,sw,sh);
  ctx.restore();
}

function str(text,x,y,size=20,thickness=6) {
  ctx.fillStyle=drawColor;
  ctx.font=`bold ${size}px "MS Gothic","ＭＳ ゴシック",monospace`;
  ctx.fillText(text,x,y+size);
}

function DrawFormatString(x,y,col,text,...args){
  // 簡易版
  ctx.fillStyle=col||'white';
  ctx.font='bold 20px "MS Gothic",monospace';
  ctx.fillText(String(text),x,y+20);
}

// ====== キー入力 ======
const KEY={};
let any_key_pushed = false; // WaitKeyエミュレーション用フラグ

document.addEventListener('keydown', e => {
  KEY[e.code] = true;
  
  // ShiftとAlt "以外" のキーが新しく押された瞬間にフラグを立てる (CtrlやWinキーも含む)
  if (e.key !== 'Shift' && e.key !== 'Alt' && !e.repeat) {
    any_key_pushed = true;
  }
  
  // ゲーム操作に使うキーのみ、画面スクロールなどのブラウザ標準動作を防ぐ
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyZ','KeyO','Enter'].includes(e.code)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { KEY[e.code]=false; });

// マウスのクリック（左・中・右クリック）でも反応させる
document.addEventListener('mousedown', () => {
  any_key_pushed = true;
});

function getGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  return pads[0];
}
function pad_left(){
  const gp = getGamepad();
  return KEY['ArrowLeft'] || (gp && (gp.axes[0] < -0.5 || gp.buttons[14]?.pressed));
}
function pad_right(){
  const gp = getGamepad();
  return KEY['ArrowRight'] || (gp && (gp.axes[0] > 0.5 || gp.buttons[15]?.pressed));
}
function pad_up(){
  const gp = getGamepad();
  return KEY['ArrowUp']||KEY['KeyZ'] || (gp && (gp.axes[1] < -0.5 || gp.buttons[12]?.pressed || gp.buttons[0]?.pressed || gp.buttons[1]?.pressed));
}
function pad_down(){
  const gp = getGamepad();
  return KEY['ArrowDown'] || (gp && (gp.axes[1] > 0.5 || gp.buttons[13]?.pressed));
}
function pad_z(){
  const gp = getGamepad();
  return KEY['KeyZ']||KEY['ArrowUp'] || (gp && (gp.buttons[0]?.pressed || gp.buttons[1]?.pressed));
}
function key_f1(){ return KEY['F1']; }
function key_enter(){
  const gp = getGamepad();
  return KEY['Enter'] || (gp && gp.buttons[9]?.pressed);

function key_0(){ return KEY['Digit0'] || KEY['Numpad0']; }
function key_1(){ return KEY['Digit1'] || KEY['Numpad1']; }

function stage(){
  scrollx=3600*100;
  
  // stagep()内で stc が変更される場合があるため、元の値を保持しておく
  let map_sta = sta;
  let map_stb = stb;
  let map_stc = stc;
  
  // 1-3地上の特例（stc===6 は 0 として扱う）
  if (map_sta === 1 && map_stb === 3 && map_stc === 6) map_stc = 0;

  stagep();
  const sd2 = currentStageData(map_sta, map_stb, map_stc);
  if(!sd2)return;
  
  // 修正箇所: 1行目の長さに依存せず、最大1000列まで確実に読み込む
  for(let col=0; col<=1000; col++){
    for(let row=0; row<17 && row<sd2.length; row++){
      const v = (sd2[row] && sd2[row][col]) || 0;
      if(!v) continue;
      
      const gx=col*29, gy=row*29-12;
      
      if(v>=1&&v<=19&&v!==9) tyobi(gx,gy,v);
      else if(v>=20&&v<=29){sra[srco]=gx*100;srb[srco]=gy*100;src[srco]=3000;srtype[srco]=0;srco++;if(srco>=SRMAX)srco=0;}
      else if(v===30){sa[sco]=gx*100;sb[sco]=gy*100;sc[sco]=3000;sd[sco]=6000;stype[sco]=500;sco++;if(sco>=SMAX)sco=0;}
      else if(v===40){sa[sco]=gx*100;sb[sco]=gy*100;sc[sco]=6000;sd[sco]=3000;stype[sco]=1;sco++;if(sco>=SMAX)sco=0;}
      else if(v===41){sa[sco]=gx*100+500;sb[sco]=gy*100;sc[sco]=5000;sd[sco]=3000;stype[sco]=2;sco++;if(sco>=SMAX)sco=0;}
      else if(v===43){sa[sco]=gx*100;sb[sco]=gy*100+500;sc[sco]=2900;sd[sco]=5300;stype[sco]=1;sco++;if(sco>=SMAX)sco=0;}
      else if(v===44){sa[sco]=gx*100;sb[sco]=gy*100+700;sc[sco]=3900;sd[sco]=5000;stype[sco]=5;sco++;if(sco>=SMAX)sco=0;}
      else if(v>=50&&v<=79){ba[bco]=gx*100;bb[bco]=gy*100;btype[bco]=v-50;bco++;if(bco>=BMAX)bco=0;}
      else if(v>=80&&v<=89){na[nco]=gx*100;nb[nco]=gy*100;ntype[nco]=v-80;nco++;if(nco>=NMAX)nco=0;}
      else if(v===9) tyobi(gx,gy,800);
      else if(v===98) {/* 装飾用コイン状ブロック - 無視 */}
      else if(v===99){sa[sco]=gx*100;sb[sco]=gy*100;sc[sco]=3000;sd[sco]=(12-row)*3000;stype[sco]=300;sco++;if(sco>=SMAX)sco=0;}
    }
  }
  
  if(tyuukan>=1){
    let found=0;
    for(let i=0;i<SMAX;i++){
      if(stype[i]===500&&tyuukan>=1){
        fx=sa[i]-FXMAX/2;fzx=fx;
        ma=sa[i]-fx;mb=sb[i]-fy;
        tyuukan--;found++;sa[i]=-80000000;
      }
    }
    tyuukan+=found;
  }
}

function currentStageData(c_sta, c_stb, c_stc) {
  if (c_sta===1 && c_stb===1 && c_stc===0) return SD_1_1;
  if (c_sta===1 && c_stb===2 && c_stc===0) return SD_1_2_0;
  if (c_sta===1 && c_stb===2 && c_stc===1) return SD_1_2_1;
  if (c_sta===1 && c_stb===2 && c_stc===2) return SD_1_2_2;
  if (c_sta===1 && c_stb===3 && c_stc===0) return SD_1_3_0;
  if (c_sta===1 && c_stb===3 && c_stc===1) return SD_1_3_1;
  if (c_sta===1 && c_stb===3 && c_stc===5) return SD_1_3_5;
  if (c_sta===1 && c_stb===4 && c_stc===0) return SD_1_4_0;
  return SD_1_1;
}

// ====== ゲームループ ======
let lastT=0;
function loop(now){
  requestAnimationFrame(loop);
  // スペースキーが押されていたら 60FPS、そうでなければ 30FPS
  const currentFPS = key_space() ? 60 : 30;
  const frameTime = 1000 / currentFPS;
  if(now - lastT < frameTime - 2) return;
  lastT = now;
  try{Mainprogram();}catch(e){console.error(e);}
}

// ====== アセットロード ======
function loadAssets(cb){
  const imgKeys=Object.keys(IMAGE_FILES);
  const sndKeys=Object.keys(SOUND_FILES);
  let total=imgKeys.length+sndKeys.length,done=0;
  const check=()=>{done++;if(done>=total)cb();};
  imgKeys.forEach(k=>{
    const img=new Image();
    img.onload=()=>{IMG[k]=applyChroma(img);check();};
    img.onerror=()=>{check();}; // 画像なしでも続行
    img.src=IMAGE_FILES[k];
    RAW[k]=img;
  });
  sndKeys.forEach(k=>{
    const a=new Audio();
    const fin=()=>{SND[k]=a;check();};
    a.addEventListener('canplaythrough',fin,{once:true});
    a.onerror=fin;
    a.preload='auto';
    a.src=SOUND_FILES[k];
    setTimeout(fin,4000); // タイムアウト
  });
}

window.addEventListener('load',()=>{
  setupGrap();
  setupAnx();
  loadAssets(()=>{
    bgmchange(100);
    requestAnimationFrame(loop);
  });
  // ロード待たずに開始(画像なしでも動く)
  setTimeout(()=>requestAnimationFrame(loop),500);
});
